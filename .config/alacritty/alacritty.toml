
import = ["~/.config/alacritty/themes/challenger_deep.toml"]

[env]
TERM = "xterm-256color"

[shell]
program = "/bin/zsh"

[window]
padding.x = 10
padding.y = 10

decorations = "buttonless"
opacity = 0.7
blur = true

[font]
normal = { family = 'FiraMono Nerd Font Mono', style = 'Regular' }
bold = { family = 'FiraMono Nerd Font Mono', style = 'Bold' }
size = 15
